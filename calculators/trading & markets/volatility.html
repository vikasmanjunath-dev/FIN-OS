<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <title>Volatility Impact • FIN-OS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/layout.css">
  <link rel="stylesheet" href="../../css/components.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    /* Reuse Styles */
    :root { --text-primary: #1e293b; --text-secondary: #64748b; --bg-main: #f1f5f9; --bg-surface: #ffffff; --card-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
    [data-theme="dark"] { --text-primary: #f8fafc; --text-secondary: #94a3b8; --bg-main: #0f172a; --bg-surface: #1e293b; --card-shadow: 0 10px 15px -3px rgba(0,0,0,0.5); }
    body { color: var(--text-primary); background: var(--bg-main); font-family: sans-serif; }
    h1, h2, h3 { color: var(--text-primary); }
    input[type="number"] { color: var(--text-primary); background: rgba(255,255,255,0.05); }
    .page { flex: 1; padding: 0 48px 24px 48px; overflow-y: auto; }
    .page-header { padding-top: 32px; margin-bottom: 40px; }
    .page-header h1 { font-size: 42px; font-weight: 700; margin: 8px 0; }
    .back-btn { display: inline-flex; align-items: center; gap: 8px; color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: color 0.2s; }
    .back-btn:hover { color: #06b6d4; }
    .impact-card { max-width: 1100px; display: grid; grid-template-columns: 1fr 1fr; gap: 48px; padding: 48px; border-radius: 32px; background: var(--bg-surface); box-shadow: var(--card-shadow); }
    .impact-inputs { display: flex; flex-direction: column; gap: 24px; }
    .input-group { display: flex; flex-direction: column; gap: 12px; }
    .input-row { display: flex; gap: 12px; align-items: center; }
    input[type="range"] { flex: 1; appearance: none; height: 6px; border-radius: 6px; background: linear-gradient(90deg, #06b6d4, #3b82f6); cursor: pointer; }
    input[type="range"]::-webkit-slider-thumb { appearance: none; width: 20px; height: 20px; border-radius: 50%; background: #ffffff; border: 3px solid #06b6d4; cursor: pointer; }
    input[type="number"] { width: 140px; padding: 10px 14px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.12); font-size: 16px; font-weight: 600; }
    .impact-right { display: flex; flex-direction: column; align-items: center; gap: 24px; }
    .chart-container { width: 100%; max-width: 360px; aspect-ratio: 1; }
    .result-grid { width: 100%; display: grid; grid-template-columns: 1fr; gap: 16px; }
    .age-comparison { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .age-box { padding: 20px; border-radius: 16px; text-align: center; background: rgba(6,182,212,0.12); }
    .age-box strong { font-size: 24px; display: block; margin-top: 4px; }
    .verdict-box { padding: 24px; border-radius: 16px; text-align: center; font-weight: 700; font-size: 18px; background: linear-gradient(135deg, rgba(34,197,94,0.15), rgba(16,185,129,0.15)); color: #22c55e; }
    @media (max-width: 900px) { .impact-card { grid-template-columns: 1fr; } }
  </style>
</head>
<body class="app">
  <aside class="sidebar">
    <div class="logo">FIN•OS</div>
    <nav>
      <a href="../../html/home.html">Home</a>
      <a href="../../html/dashboard.html">Dashboard</a>
      <a href="../../html/impact.html">Impact</a>
      <a href="../../html/calculators.html" class="active">Calculators</a>
      <a href="../../../Porfolio Analyser/portfolio-analyser-v9.html">Portfolio</a>
      <a href="../../html/markets.html">Markets</a>
      <a href="../../html/tax.html">Tax</a>
      <a href="../../html/news.html">News</a>
    </nav>
  </aside>

  <main class="page">
    <button id="themeToggle" style="position: fixed; top: 32px; right: 32px; z-index: 100; background:none; border:none; font-size:24px; cursor:pointer;">🌙</button>

    <header class="page-header">
      <a href="../../html/calculators.html" class="back-btn">← Back to Calculators</a>
      <h1>Volatility Impact (Vega)</h1>
      <p>Estimate how IV changes affect option premium.</p>
    </header>

    <section class="impact-card">
      <div class="impact-left">
        <div class="impact-inputs">
          <div class="input-group">
            <label>Current Option Premium (₹)</label>
            <div class="input-row"><input type="number" value="200" id="prem"></div>
          </div>
          <div class="input-group">
            <label>Option Vega (₹)</label>
            <div class="input-row"><input type="number" value="15" id="vega"></div>
            <span style="font-size:12px; color:var(--text-secondary); margin-top:4px;">*Change in price per 1% change in IV</span>
          </div>
          <div class="input-group">
            <label>Change in IV (+/- %)</label>
            <div class="input-row">
              <input type="range" min="-20" max="20" step="1" value="5" id="iv">
              <input type="number" value="5" id="ivNum">
            </div>
          </div>
        </div>
      </div>
      <div class="impact-right">
        <div class="chart-container"><canvas id="vegaChart"></canvas></div>
        <div class="result-grid">
          <div class="age-comparison">
            <div class="age-box"><span>Old Premium</span><strong id="oldVal">₹200</strong></div>
            <div class="age-box" style="background: rgba(139,92,246,0.12)"><span>New Premium</span><strong id="newVal">₹275</strong></div>
          </div>
          <div class="verdict-box ahead" id="diffVal">Gain: +₹75</div>
        </div>
      </div>
    </section>
  </main>

<script>
// Theme Logic
const root = document.documentElement;
const toggle = document.getElementById("themeToggle");
toggle.onclick = () => { root.setAttribute("data-theme", root.getAttribute("data-theme")==="dark"?"light":"dark"); };

const els = {
  p: document.getElementById('prem'),
  v: document.getElementById('vega'),
  i: document.getElementById('iv'), iN: document.getElementById('ivNum')
};

['i'].forEach(k => {
  els[k].oninput = () => { els[k+'N'].value = els[k].value; calculate(); }
  els[k+'N'].oninput = () => { els[k].value = els[k+'N'].value; calculate(); }
});
els.p.oninput = calculate; els.v.oninput = calculate;

const ctx = document.getElementById('vegaChart');
const chart = new Chart(ctx, {
  type: 'bar',
  data: {
    labels: ['Old Price', 'New Price'],
    datasets: [{ data: [200, 275], backgroundColor: ['#334155', '#22c55e'], borderWidth: 0 }]
  },
  options: {
    scales: { x: { display: false } },
    plugins: { legend: { display: false } }
  }
});

function calculate() {
  const premium = +els.p.value;
  const vega = +els.v.value;
  const ivChange = +els.iN.value;

  const change = vega * ivChange;
  const newPremium = Math.max(0, premium + change);

  document.getElementById('oldVal').textContent = "₹" + premium;
  document.getElementById('newVal').textContent = "₹" + newPremium;
  
  const diffEl = document.getElementById('diffVal');
  if (change > 0) {
      diffEl.textContent = "Increase: +₹" + change;
      diffEl.className = "verdict-box ahead";
      chart.data.datasets[0].backgroundColor = ['#334155', '#22c55e'];
  } else {
      diffEl.textContent = "Decrease: -₹" + Math.abs(change);
      diffEl.className = "verdict-box behind";
      chart.data.datasets[0].backgroundColor = ['#334155', '#ef4444'];
  }

  chart.data.datasets[0].data = [premium, newPremium];
  chart.update();
}

calculate();
</script>
</body>
</html>
