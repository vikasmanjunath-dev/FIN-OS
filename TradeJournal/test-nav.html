<!DOCTYPE html>
<html>
<head>
  <title>Navigation Test</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 20px; background: #222; color: #fff; }
    .container { display: flex; gap: 20px; }
    .sidebar { width: 200px; padding: 16px; background: #333; border-radius: 8px; }
    .main { flex: 1; }
    button { display: block; width: 100%;padding: 10px; margin-bottom: 8px; background: #00ff88; color: #000; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
    button.active { background: #00ff88; }
    button:not(.active) { background: #555; color: #fff; }
    .page { display: none; padding: 20px; background: #444; border-radius: 8px; margin-bottom: 16px; }
    .page.active { display: block; background: #00ff88; color: #000; }
    .console-output { background: #000; padding: 10px; border-radius: 4px; max-height: 200px; overflow-y: auto; font-size: 12px; color: #0f0; margin-top: 20px; }
  </style>
</head>
<body>
  <h1>TradeBook Navigation Test</h1>
  <div class="container">
    <div class="sidebar">
      <h3>Navigation</h3>
      <button class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">Dashboard</button>
      <button class="nav-item" data-page="journal" onclick="navigateTo('journal')">Journal</button>
      <button class="nav-item" data-page="analytics" onclick="navigateTo('analytics')">Analytics</button>
      <button class="nav-item" data-page="settings" onclick="navigateTo('settings')">Settings</button>
    </div>
    <div class="main">
      <div id="page-dashboard" class="page active">
        <h2>Dashboard</h2>
        <p>This is the Dashboard page. Click other buttons to navigate.</p>
      </div>
      <div id="page-journal" class="page">
        <h2>Journal</h2>
        <p>This is the Journal page.</p>
      </div>
      <div id="page-analytics" class="page">
        <h2>Analytics</h2>
        <p>This is the Analytics page.</p>
      </div>
      <div id="page-settings" class="page">
        <h2>Settings</h2>
        <p>This is the Settings page.</p>
      </div>
    </div>
  </div>

  <div class="console-output">
    <strongConsole Output:</strong>
    <div id="console"></div>
  </div>

  <script>
    // Simple logging
    function log(msg) {
      const el = document.getElementById('console');
      el.innerHTML += msg + '<br>';
      el.scrollTop = el.scrollHeight;
    }

    window.navigateTo = function(page) {
      log(`➤ navigateTo('${page}') called`);
      
      // Hide all pages
      document.querySelectorAll('.page').forEach(p => {
        p.classList.remove('active');
        log(`  • Hid page: ${p.id}`);
      });

      // Show target page
      const target = document.getElementById('page-' + page);
      if (target) {
        target.classList.add('active');
        log(`  ✓ Showed page: ${target.id}`);
      } else {
        log(`  ✗ Page not found: page-${page}`);
      }

      // Update nav buttons
      document.querySelectorAll('.nav-item').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });
    };
  </script>
</body>
</html>
