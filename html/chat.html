<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>FIN-OS | QFT Core Chat</title>
  <style>
    body { background: #09090b; color: #d4d4d8; font-family: 'JetBrains Mono', monospace; margin: 0; display: flex; flex-direction: column; height: 100vh; }
    .header { padding: 15px 20px; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; gap: 10px; background: #111113; }
    .dot { width: 10px; height: 10px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80; animation: pulse 2s infinite; }
    @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }
    
    .chat-container { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
    .msg { max-width: 80%; padding: 12px 16px; border-radius: 8px; line-height: 1.5; font-family: 'IBM Plex Sans', sans-serif; }
    .msg.user { align-self: flex-end; background: rgba(79, 124, 255, 0.15); border: 1px solid rgba(79, 124, 255, 0.3); color: #fff; }
    .msg.assistant { align-self: flex-start; background: #18181b; border: 1px solid rgba(255,255,255,0.05); }
    
    .input-area { padding: 20px; background: #111113; border-top: 1px solid rgba(255,255,255,0.1); display: flex; gap: 10px; }
    input { flex: 1; background: #09090b; border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 12px; border-radius: 6px; font-family: 'JetBrains Mono'; }
    button { background: #d4d4d8; color: #000; border: none; padding: 0 25px; font-weight: bold; cursor: pointer; border-radius: 6px; font-family: 'JetBrains Mono'; }
    button:hover { background: #fff; }
  </style>
</head>
<body>

  <div class="header">
    <div class="dot"></div>
    <strong>QFT CORE ONLINE</strong>
  </div>

  <div class="chat-container" id="chatBox">
    <div class="msg assistant">SYSTEM INITIALIZED. I am your financial mentor. Feed me your data, and I will give you the brutal mathematical reality.</div>
  </div>

  <div class="input-area">
    <input type="text" id="chatInput" placeholder="Enter your financial query..." autocomplete="off">
    <button id="sendBtn">SEND</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    const chatBox = document.getElementById('chatBox');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    let sessionId = null; // Memory persistence

    async function sendMessage() {
      const text = chatInput.value.trim();
      if (!text) return;

      // Add user message to UI
      appendMessage(text, 'user');
      chatInput.value = '';

      // Create an empty assistant message box for the stream
      const assistantDiv = document.createElement('div');
      assistantDiv.className = 'msg assistant';
      assistantDiv.innerHTML = '<span style="opacity:0.5">Processing...</span>';
      chatBox.appendChild(assistantDiv);
      chatBox.scrollTop = chatBox.scrollHeight;

      try {
        const response = await fetch('http://127.0.0.1:8000/api/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text, session_id: sessionId })
        });

        const reader = response.body.getReader();
        const decoder = new TextDecoder("utf-8");
        assistantDiv.innerHTML = ''; // clear loading text
        let fullContent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          
          const chunk = decoder.decode(value, { stream: true });
          const lines = chunk.split('\n');
          
          for (let line of lines) {
            if (line.startsWith('data: ')) {
              const data = JSON.parse(line.replace('data: ', ''));
              if (data.session_id) sessionId = data.session_id; // Save session
              if (data.token) {
                fullContent += data.token;
                assistantDiv.innerHTML = marked.parse(fullContent);
                chatBox.scrollTop = chatBox.scrollHeight;
              }
            }
          }
        }
      } catch (e) {
        assistantDiv.innerHTML = `<span style="color:#FF4F4F">Connection Error: Ensure backend is running.</span>`;
      }
    }

    function appendMessage(text, sender) {
      const div = document.createElement('div');
      div.className = `msg ${sender}`;
      div.innerText = text;
      chatBox.appendChild(div);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    sendBtn.addEventListener('click', sendMessage);
    chatInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });
  </script>
</body>
</html>
