(function(){var t=localStorage.getItem('finos-theme')||localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();

<style>
#floatThemeBtn {
  position: fixed; top: 14px; right: 18px; z-index: 9999;
  width: 36px; height: 36px; border-radius: 10px;
  background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.10);
  color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background .2s, transform .2s;
  backdrop-filter: blur(10px);
}
#floatThemeBtn:hover { background: rgba(255,255,255,0.12); transform: scale(1.08); }
</style>
<button id="floatThemeBtn" aria-label="Toggle theme">🌙</button>
<script>
(function(){
  var btn = document.getElementById('floatThemeBtn');
  var html = document.documentElement;
  var saved = localStorage.getItem('finos-theme') || localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', saved);
  btn.textContent = saved === 'dark' ? '🌙' : '☀️';
  btn.addEventListener('click', function(){
    var cur = html.getAttribute('data-theme');
    var next = cur === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    localStorage.setItem('finos-theme', next);
    localStorage.setItem('theme', next);
    btn.textContent = next === 'dark' ? '🌙' : '☀️';
  });
})();
</script>

  <script src="../js/finos-widget.js"></script>
  <script src="../js/finos-search.js"></script>
</body>
</html>
