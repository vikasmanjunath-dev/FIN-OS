<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<script>
(function(){var t=localStorage.getItem('finos-theme')||localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();
</script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0B0D12">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FIN•OS">
  <link rel="manifest" href="../manifest.json">
  <link rel="apple-touch-icon" href="../assets/icons/icon-192.svg">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <title>DNA Decoder | FIN•OS</title>
  
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/layout.css">
  <link rel="stylesheet" href="../css/dna-decoder.css">
  <link rel="stylesheet" href="../css/theme.css">
  
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Manrope:wght@800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="app">
<div class="app">
    <aside class="sidebar">
    <div class="logo">FIN•OS</div>
        <nav>
      <a href="profile.html"><span class="user-symbol">👤</span> Profile</a>
      <a href="home.html">Home</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="foundations.html">Foundations</a>
      <a href="diagnostics.html" class="active">Diagnostics</a>
      <a href="track-finances.html">Track Finances</a>
      <a href="/html/stock-dashboard/index.html">Live Tracker</a>
      <a href="/html/simulator-landing.html">Train Mindset</a>
      <a href="/html/news.html">News</a>
      <a href="/html/settings.html">Settings</a>
    </nav>
  </aside>

  <main class="main">
    <div class="dna-terminal-container">
      
          <header class="header header-flex">
            <div>
              <h1 class="glitch" data-text="INITIALIZE_DNA_SCAN">INITIALIZE_DNA_SCAN</h1>
              <p class="status-msg">> PROTOCOL: <span class="neon-blue">POV_DECODER_V2</span></p>
            </div>

            <button id="themeToggle" class="theme-btn" onclick="toggleAppTheme()">🌙</button>
          </header>

      <div class="dna-grid">
        <section class="terminal glass">
          <div id="quiz-flow">
            </div>
          <div class="progress-wrap">
            <div id="dna-progress" class="progress-bar"></div>
          </div>
        </section>

        <section class="visualizer glass">
          <div class="map-label">Neural_Architecture_Output</div>
          <div class="chart-box">
            <canvas id="dnaChart"></canvas>
          </div>
          <div class="console-output" id="console-logs">
            <p>> System initialized. Awaiting user input...</p>
          </div>
        </section>
      </div>

    </div>
  </main>
</div>

<script src="../js/dna-logic.js"></script>
  <script src="../js/mobile-nav.js"></script>
  <script src="../js/pwa-init.js"></script>

<style>
#floatBackBtn {
  position: fixed; bottom: 22px; left: 82px; z-index: 9999;
  padding: 8px 16px 8px 12px; border-radius: 10px;
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.55); font-family: 'JetBrains Mono',monospace;
  font-size: 11px; font-weight: 600; letter-spacing: .06em;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: background .2s, color .2s, transform .2s;
  backdrop-filter: blur(10px); text-decoration: none;
}
#floatBackBtn:hover { background: rgba(255,255,255,0.10); color: #fff; transform: translateX(-3px); }
</style>
<a id="floatBackBtn" onclick="history.back(); return false;" href="#">‹ BACK</a>

  <script src="../js/finos-widget.js"></script>
  <script src="../js/finos-search.js"></script>
</body>
</html>
