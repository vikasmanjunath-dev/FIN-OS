<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bgGrad192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0D12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12151E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C7F000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9BC800;stop-opacity:1" />
    </linearGradient>
    <filter id="glow192">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="32" fill="url(#bgGrad192)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#C7F000" stroke-width="0.5">
    <!-- Horizontal lines -->
    <line x1="0" y1="32" x2="192" y2="32"/>
    <line x1="0" y1="64" x2="192" y2="64"/>
    <line x1="0" y1="96" x2="192" y2="96"/>
    <line x1="0" y1="128" x2="192" y2="128"/>
    <line x1="0" y1="160" x2="192" y2="160"/>
    <!-- Vertical lines -->
    <line x1="32" y1="0" x2="32" y2="192"/>
    <line x1="64" y1="0" x2="64" y2="192"/>
    <line x1="96" y1="0" x2="96" y2="192"/>
    <line x1="128" y1="0" x2="128" y2="192"/>
    <line x1="160" y1="0" x2="160" y2="192"/>
  </g>

  <!-- Circuit node dots at intersections (decorative) -->
  <g fill="#C7F000" opacity="0.12">
    <circle cx="32" cy="32" r="2.5"/>
    <circle cx="160" cy="32" r="2.5"/>
    <circle cx="32" cy="160" r="2.5"/>
    <circle cx="160" cy="160" r="2.5"/>
    <circle cx="96" cy="32" r="2.5"/>
    <circle cx="32" cy="96" r="2.5"/>
    <circle cx="160" cy="96" r="2.5"/>
    <circle cx="96" cy="160" r="2.5"/>
  </g>

  <!-- Accent line top-left circuit trace -->
  <g stroke="#C7F000" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round">
    <polyline points="32,56 32,44 44,44"/>
    <circle cx="32" cy="56" r="3" fill="#C7F000" stroke="none"/>
    <circle cx="44" cy="44" r="3" fill="#C7F000" stroke="none"/>
  </g>

  <!-- Accent line bottom-right circuit trace -->
  <g stroke="#C7F000" stroke-width="1.5" fill="none" opacity="0.25" stroke-linecap="round">
    <polyline points="160,136 160,148 148,148"/>
    <circle cx="160" cy="136" r="3" fill="#C7F000" stroke="none"/>
    <circle cx="148" cy="148" r="3" fill="#C7F000" stroke="none"/>
  </g>

  <!-- Thin accent border ring -->
  <rect x="12" y="12" width="168" height="168" rx="24" fill="none" stroke="#C7F000" stroke-width="1" opacity="0.15"/>

  <!-- Main text: FIN•OS -->
  <text
    x="96"
    y="104"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="800"
    letter-spacing="2"
    text-anchor="middle"
    fill="url(#accentGrad192)"
    filter="url(#glow192)"
  >FIN•OS</text>

  <!-- Subtle tagline -->
  <text
    x="96"
    y="126"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="9"
    font-weight="400"
    letter-spacing="3"
    text-anchor="middle"
    fill="#ffffff"
    opacity="0.35"
  >FINANCIAL OS</text>
</svg>
