<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0D12;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12151E;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C7F000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9BC800;stop-opacity:1" />
    </linearGradient>
    <filter id="glow512">
      <feGaussianBlur stdDeviation="6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" fill="url(#bgGrad512)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.06" stroke="#C7F000" stroke-width="1">
    <!-- Horizontal lines -->
    <line x1="0" y1="64" x2="512" y2="64"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="192" x2="512" y2="192"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="320" x2="512" y2="320"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
    <line x1="0" y1="448" x2="512" y2="448"/>
    <!-- Vertical lines -->
    <line x1="64" y1="0" x2="64" y2="512"/>
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="192" y1="0" x2="192" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="320" y1="0" x2="320" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="448" y1="0" x2="448" y2="512"/>
  </g>

  <!-- Circuit node dots at intersections (decorative) -->
  <g fill="#C7F000" opacity="0.12">
    <circle cx="64" cy="64" r="5"/>
    <circle cx="448" cy="64" r="5"/>
    <circle cx="64" cy="448" r="5"/>
    <circle cx="448" cy="448" r="5"/>
    <circle cx="256" cy="64" r="5"/>
    <circle cx="64" cy="256" r="5"/>
    <circle cx="448" cy="256" r="5"/>
    <circle cx="256" cy="448" r="5"/>
    <circle cx="192" cy="128" r="4"/>
    <circle cx="320" cy="384" r="4"/>
  </g>

  <!-- Accent circuit trace — top-left -->
  <g stroke="#C7F000" stroke-width="3" fill="none" opacity="0.28" stroke-linecap="round">
    <polyline points="64,140 64,108 96,108"/>
    <circle cx="64" cy="140" r="6" fill="#C7F000" stroke="none"/>
    <circle cx="96" cy="108" r="6" fill="#C7F000" stroke="none"/>
    <line x1="96" y1="108" x2="128" y2="108"/>
    <circle cx="128" cy="108" r="4" fill="none" stroke="#C7F000" stroke-width="2"/>
  </g>

  <!-- Accent circuit trace — bottom-right -->
  <g stroke="#C7F000" stroke-width="3" fill="none" opacity="0.28" stroke-linecap="round">
    <polyline points="448,372 448,404 416,404"/>
    <circle cx="448" cy="372" r="6" fill="#C7F000" stroke="none"/>
    <circle cx="416" cy="404" r="6" fill="#C7F000" stroke="none"/>
    <line x1="416" y1="404" x2="384" y2="404"/>
    <circle cx="384" cy="404" r="4" fill="none" stroke="#C7F000" stroke-width="2"/>
  </g>

  <!-- Accent circuit trace — top-right -->
  <g stroke="#C7F000" stroke-width="2" fill="none" opacity="0.18" stroke-linecap="round">
    <polyline points="384,64 384,96 448,96"/>
  </g>

  <!-- Accent circuit trace — bottom-left -->
  <g stroke="#C7F000" stroke-width="2" fill="none" opacity="0.18" stroke-linecap="round">
    <polyline points="128,448 128,416 64,416"/>
  </g>

  <!-- Thin accent border ring -->
  <rect x="24" y="24" width="464" height="464" rx="64" fill="none" stroke="#C7F000" stroke-width="2" opacity="0.14"/>

  <!-- Main text: FIN•OS -->
  <text
    x="256"
    y="282"
    font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
    font-size="96"
    font-weight="800"
    letter-spacing="4"
    text-anchor="middle"
    fill="url(#accentGrad512)"
    filter="url(#glow512)"
  >FIN•OS</text>

  <!-- Subtle tagline -->
  <text
    x="256"
    y="330"
    font-family="'SF Pro Text', 'Helvetica Neue', Arial, sans-serif"
    font-size="22"
    font-weight="400"
    letter-spacing="10"
    text-anchor="middle"
    fill="#ffffff"
    opacity="0.32"
  >FINANCIAL OS</text>
</svg>
